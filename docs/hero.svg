<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <radialGradient id="bg" cx="72%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#10303a"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="420" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="859" height="419" rx="14" fill="none" stroke="#1d2530"/>

  <!-- title -->
  <text x="34" y="52" fill="#ffffff" font-size="30" font-weight="800" letter-spacing="3">QUORUM</text>
  <text x="190" y="52" fill="#5cf2ff" font-size="14">break a distributed database on purpose</text>
  <text x="34" y="76" fill="#64748b" font-size="12">leaderless quorum replication · version-vector conflicts · node-to-node trust — live</text>

  <!-- partition rift -->
  <line x1="430" y1="120" x2="430" y2="360" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.55"/>
  <text x="412" y="112" fill="#fb7185" font-size="11">⚡ partition</text>

  <!-- links -->
  <g stroke-width="1" opacity="0.5">
    <line x1="300" y1="180" x2="300" y2="320" stroke="#2a3340"/>
    <line x1="300" y1="180" x2="560" y2="250" stroke="#fb7185" stroke-dasharray="5 5" opacity="0.6"/>
    <line x1="300" y1="320" x2="560" y2="250" stroke="#fb7185" stroke-dasharray="5 5" opacity="0.6"/>
  </g>

  <!-- replication pulses -->
  <circle cx="380" cy="215" r="5" fill="#5cf2ff" filter="url(#glow)"/>
  <circle cx="425" cy="285" r="5" fill="#34d399" filter="url(#glow)"/>

  <!-- nodes -->
  <g>
    <circle cx="300" cy="180" r="34" fill="#0f141c" stroke="#5cf2ff" stroke-width="2" filter="url(#glow)"/>
    <text x="300" y="178" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">n1</text>
    <text x="300" y="194" text-anchor="middle" fill="#64748b" font-size="9">grp 1</text>

    <circle cx="300" cy="320" r="34" fill="#0f141c" stroke="#fbbf24" stroke-width="2"/>
    <text x="300" y="318" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">n2</text>
    <text x="300" y="334" text-anchor="middle" fill="#64748b" font-size="9">grp 2</text>

    <circle cx="560" cy="250" r="34" fill="#0f141c" stroke="#fbbf24" stroke-width="2"/>
    <text x="560" y="248" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">n3</text>
    <text x="560" y="264" text-anchor="middle" fill="#64748b" font-size="9">grp 2</text>
  </g>

  <!-- quorum panel -->
  <g>
    <rect x="650" y="120" width="178" height="92" rx="8" fill="#0f141c" stroke="#1d2530"/>
    <text x="664" y="142" fill="#94a3b8" font-size="10" letter-spacing="2">QUORUM</text>
    <text x="664" y="166" fill="#e2e8f0" font-size="13">N=3   W=2   R=2</text>
    <rect x="664" y="178" width="150" height="22" rx="5" fill="#0d2a22" stroke="#34d399" opacity="0.9"/>
    <text x="672" y="193" fill="#34d399" font-size="11">R + W = 4 &gt; N ✓ consistent</text>
  </g>

  <!-- conflict panel -->
  <g>
    <rect x="650" y="226" width="178" height="118" rx="8" fill="#0f141c" stroke="#3b2230"/>
    <text x="664" y="248" fill="#fb7185" font-size="10" letter-spacing="2">⚠ SIBLINGS</text>
    <rect x="664" y="258" width="150" height="32" rx="5" fill="#15191f" stroke="#2a3340"/>
    <text x="672" y="272" fill="#e2e8f0" font-size="11">from-side-A</text>
    <text x="672" y="285" fill="#64748b" font-size="9">n1:1</text>
    <rect x="664" y="296" width="150" height="32" rx="5" fill="#15191f" stroke="#2a3340"/>
    <text x="672" y="310" fill="#e2e8f0" font-size="11">from-side-B</text>
    <text x="672" y="323" fill="#64748b" font-size="9">n2:1</text>
  </g>

  <!-- footer chips -->
  <g font-size="11" font-weight="600">
    <rect x="34" y="372" width="92" height="22" rx="11" fill="none" stroke="#2a3340"/>
    <text x="80" y="387" text-anchor="middle" fill="#94a3b8">DDIA</text>
    <rect x="134" y="372" width="150" height="22" rx="11" fill="none" stroke="#2a3340"/>
    <text x="209" y="387" text-anchor="middle" fill="#94a3b8">C++ Concurrency</text>
    <rect x="292" y="372" width="74" height="22" rx="11" fill="none" stroke="#2a3340"/>
    <text x="329" y="387" text-anchor="middle" fill="#94a3b8">WAHH</text>
    <rect x="374" y="372" width="92" height="22" rx="11" fill="none" stroke="#34d399" opacity="0.6"/>
    <text x="420" y="387" text-anchor="middle" fill="#34d399">● live</text>
  </g>
</svg>
