name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cluster/go.sum
      - name: vet
        run: cd cluster && go vet ./...
      - name: test (race detector)
        run: cd cluster && go test -race -count=1 ./...

  frontend:
    name: frontend (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: cd web && npm ci
      - name: typecheck + build
        run: cd web && npm run build

  docker:
    name: docker image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t quorum:ci .
